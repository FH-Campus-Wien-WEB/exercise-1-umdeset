<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        /* Part 3: Your styling goes here */
        body {
            background-color: #293845;      /*himmelblau*/
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /*schriftart*/
           /* padding: 40px 50px;        /* rand */
           /* display: flex;
           /* flex-wrap: wrap;
            justify-content: center;
            /*grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); /* ein article ist min 300 px lang aber wenn da lücke ist wächst er um 1 so dass keine lücke ist.*/
            /*gap: 25px; /*abstand zwischen articles*/
            padding: 40px 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }
        article {
            background-color: #D2DCE6;      /* article soll eifnach ein weißes hintergrund haben*/
            border-radius: 15px;        /* kanten runden damit das schöner ausschaut */
            padding: 20px;                 /* abstand zwischen text und article rand*/
           /* margin-bottom: 20px;        /* abstand zum nächsten film */
            display: flex;
            flex-direction: column; /* dafür dass alle article gleich auschauen, obwohl ein text mal länger ist*/
            box-shadow: 0 8px 20px 0 rgba(0, 0, 0, 0.4); /*einfach ganz leicht schatten wenn keine interaktion */
            transition: transform 0.3s ease, box-shadow 0.3s ease; /*easy animation wenn man interagiert, karte geht hoch und schatten wird dunkler*/
            width: 260px;
            overflow: hidden; /*bildecken schneiden*/
        }
        article:hover {
            transform: translateY(-8px);    /* article schwebt bisschen hoch*/
            box-shadow: 0 15px 40px rgba(186, 230, 253, 0.4); /*schatten wird krasser*/
        }
        .genre {
            background-color: #bae6fd; /* Helles Blau */
            color: #0369a1; /* Dunkelblau für den Text */
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-right: 5px;
            margin-top: 10px;
            font-weight: bold;
            font-size: 0.9em;
            transition: all 0.3s ease; /* simple animation wieder*/
        }

        .genre:hover {
            background-color: #0284c7; /* blau wird dunkler */
            color: #ffffff; /* text wird weiß */
            box-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8; /* glow effekt, macht einfach unser schatten in blau*/
            cursor: default;
        }
        img{
            width: calc(100% + 40px);
            max-width: none;
            margin: -20px -20px 20px -20px;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
            border-bottom: 6px solid #3D5468;
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }
        article:hover img{
            border-bottom-color: #526E87;
            box-shadow: 0 4px 15px rgba(82, 110, 135, 0.8);
        }
        h2{
            color: #0369a1;
            text-align: center;
            font-size: 1.6em;
            font-weight: 800;
            margin-top: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 75px;
        }
        .movie-info{
            color: #012132;
            font-weight: 800;

            text-align: left;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .rating-container{
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .imdb {
            background-color: #F5C518;
            color: #000000;
            font-family: Impact, 'Arial Black', sans-serif;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            letter-spacing: 1px;
        }
        .metascore {
            background-color: #66CC33;
            color: #000000;
            font-family: 'Arial Black', Arial, sans-serif;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
        }
        .genre-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .genre {
            background-color: #bae6fd;
            color: #0369a1;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85em;
            transition: all 0.3s ease;
        }
        h3{
            color: #406a7a;
            text-align: center;
            border-bottom: 3px solid #607483;
            padding-bottom: 8px;
            margin-top: 25px;
            margin-bottom: 15px;
            font-size: 1.2em;
        }li {
             color: #012132;
             font-weight: normal;
             margin-bottom: 5px;
             line-height: 1.4;
         }
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            text-align: center;
        }
        article p:last-of-type {
            border-top: 3px solid #0369a1;
            padding-top: 30px;
            margin-top: 20px;
            margin-left: -20px;
            margin-right: -20px;
            padding-left: 20px;
            padding-right: 20px;
            font-size: 0.85em;
            line-height: 1.5;
            text-align: justify;
        }
    </style>
    <script>
        function reverseString(s) {
            return s.split("").reverse().join("");
        }

        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {
                    /* Part 2: Build the HTML elements here and append them to the body */
                    const movies = JSON.parse(xhr.responseText)
                    movies.forEach(function (movie) {
                        const movieArticle = document.createElement("article");
                        const posterElement = document.createElement("img");
                        const titleElement = document.createElement("h2");
                        const infoElement = document.createElement("p");
                        const plotElement = document.createElement("p");
                        const directorHeader = document.createElement("h3");
                        const directorList = document.createElement("ul");
                        const writerHeader = document.createElement("h3");
                        const writerList = document.createElement("ul");
                        const actorHeader = document.createElement("h3");
                        const actorList = document.createElement("ul");


                        movieArticle.append(posterElement);
                        movieArticle.append(titleElement);
                        movieArticle.append(infoElement);
                        const ratingContainer = document.createElement("div");
                        ratingContainer.className = "rating-container";
                        const imdbSpan = document.createElement("span");
                        imdbSpan.className = "imdb";
                        imdbSpan.textContent = "IMDb " + movie.imdbRating;
                        const metaSpan = document.createElement("span");
                        metaSpan.className = "metascore";
                        metaSpan.textContent = "Metascore " + movie.Metascore;
                        ratingContainer.append(imdbSpan);
                        ratingContainer.append(metaSpan);
                        movieArticle.append(ratingContainer);
                        const genreContainer = document.createElement("div");
                        genreContainer.className = "genre-container";

                        movie.Genres.forEach(function (genre) {
                            const genreSpan = document.createElement("span");
                            genreSpan.textContent = genre;
                            genreSpan.className = "genre";
                            genreContainer.append(genreSpan);
                        });

                        movieArticle.append(genreContainer);
                        movieArticle.append(directorHeader);
                        movie.Directors.forEach(function (director) {
                            const li = document.createElement("li");
                            li.textContent = director;
                            directorList.append(li);
                        })
                        movieArticle.append(directorList);

                        movieArticle.append(writerHeader);
                        movie.Writers.forEach(function (writer) {
                            const li = document.createElement("li");
                            li.textContent = writer;
                            writerList.append(li);
                        })
                        movieArticle.append(writerList);

                        movieArticle.append(actorHeader);
                        movie.Actors.forEach(function (actor) {
                            const li = document.createElement("li");
                            li.textContent = actor;
                            actorList.append(li);
                        })
                        movieArticle.append(actorList);

                        movieArticle.append(plotElement);


                        posterElement.src = movie.Poster;
                        infoElement.innerHTML = "• Runtime: " + movie.Runtime + "m <br>• Released on: " + movie.Released;
                        infoElement.className = "movie-info";
                        titleElement.textContent = movie.Title;
                        bodyElement.append(movieArticle);
                        plotElement.textContent = movie.Plot;
                        directorHeader.textContent = "Director";
                        writerHeader.textContent = "Writer";
                        actorHeader.textContent = "Actor";

                    })
                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

<body>
</body>

</html>
